<svg width="100%" viewBox="0 0 680 620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Internet / WAN -->
  <g class="c-gray">
    <rect x="254" y="20" width="172" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Internet / WAN</text>
  </g>

  <!-- Arrow: Internet -> Router/Firewall -->
  <line x1="340" y1="64" x2="340" y2="100" class="arr" marker-end="url(#arrow)"/>

  <!-- Router / Firewall -->
  <g class="c-coral">
    <rect x="234" y="100" width="212" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="118" text-anchor="middle" dominant-baseline="central">Router / Firewall</text>
    <text class="ts" x="340" y="138" text-anchor="middle" dominant-baseline="central">Network perimeter</text>
  </g>

  <!-- Arrow: Router -> LAN Switch -->
  <line x1="340" y1="156" x2="340" y2="195" class="arr" marker-end="url(#arrow)"/>

  <!-- LAN Container (dashed) -->
  <rect x="30" y="195" width="620" height="400" rx="16" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="6 4" opacity="0.4"/>
  <text class="ts" x="50" y="215">Internal LAN</text>

  <!-- LAN Switch -->
  <g class="c-gray">
    <rect x="254" y="220" width="172" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="242" text-anchor="middle" dominant-baseline="central">LAN switch</text>
  </g>

  <!-- Arrows from switch to three servers -->
  <!-- Left: DC -->
  <line x1="290" y1="264" x2="140" y2="320" class="arr" marker-end="url(#arrow)"/>
  <!-- Center: File Server -->
  <line x1="340" y1="264" x2="340" y2="320" class="arr" marker-end="url(#arrow)"/>
  <!-- Right: Windows Laptop -->
  <line x1="390" y1="264" x2="540" y2="320" class="arr" marker-end="url(#arrow)"/>

  <!-- Domain Controller (Server 2019) -->
  <g class="node c-purple" onclick="sendPrompt('Tell me more about setting up a domain controller on Server 2019')">
    <rect x="50" y="320" width="180" height="76" rx="8" stroke-width="0.5"/>
    <text class="th" x="140" y="344" text-anchor="middle" dominant-baseline="central">Domain controller</text>
    <text class="ts" x="140" y="364" text-anchor="middle" dominant-baseline="central">Server 2019</text>
    <text class="ts" x="140" y="382" text-anchor="middle" dominant-baseline="central">AD DS / DNS / DHCP</text>
  </g>

  <!-- File Server -->
  <g class="node c-teal" onclick="sendPrompt('Tell me more about configuring a Windows file server with group policy mapped drives')">
    <rect x="255" y="320" width="170" height="76" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="344" text-anchor="middle" dominant-baseline="central">File server</text>
    <text class="ts" x="340" y="364" text-anchor="middle" dominant-baseline="central">Windows Server</text>
    <text class="ts" x="340" y="382" text-anchor="middle" dominant-baseline="central">Mapped drive (GPO)</text>
  </g>

  <!-- Windows Laptop -->
  <g class="node c-blue" onclick="sendPrompt('Tell me more about domain-joining a Windows laptop')">
    <rect x="455" y="320" width="170" height="76" rx="8" stroke-width="0.5"/>
    <text class="th" x="540" y="344" text-anchor="middle" dominant-baseline="central">Windows laptop</text>
    <text class="ts" x="540" y="364" text-anchor="middle" dominant-baseline="central">Domain-joined</text>
    <text class="ts" x="540" y="382" text-anchor="middle" dominant-baseline="central">End-user client</text>
  </g>

  <!-- Bidirectional arrows: DC <-> File Server (AD trust / auth) -->
  <line x1="230" y1="358" x2="253" y2="358" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="242" y="348" text-anchor="middle">Auth</text>

  <!-- Arrow: Laptop -> File Server (mapped drive access) -->
  <line x1="455" y1="370" x2="427" y2="370" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="441" y="360" text-anchor="middle">SMB</text>

  <!-- User accounts summary box -->
  <g class="c-amber">
    <rect x="60" y="440" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="190" y="460" text-anchor="middle" dominant-baseline="central">150+ user accounts</text>
    <text class="ts" x="190" y="480" text-anchor="middle" dominant-baseline="central">10 IT admin accounts</text>
  </g>

  <!-- Leader line from user box to DC -->
  <line class="leader" x1="190" y1="440" x2="155" y2="398"/>
  <circle cx="155" cy="398" r="2" fill="var(--t)"/>

  <!-- GPO summary box -->
  <g class="c-green">
    <rect x="360" y="440" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="490" y="460" text-anchor="middle" dominant-baseline="central">Group policy</text>
    <text class="ts" x="490" y="480" text-anchor="middle" dominant-baseline="central">Drive mapping to file server</text>
  </g>

  <!-- Leader line from GPO box to both DC and File Server -->
  <line class="leader" x1="400" y1="440" x2="340" y2="398"/>
  <circle cx="340" cy="398" r="2" fill="var(--t)"/>

  <!-- Legend -->
  <text class="ts" x="50" y="560">Click any component to explore further</text>
</svg>